// Firebase helpers exposed globally
window.fbSetDoc = async (key, val) => {
  await setDoc(doc(db, "babytracker", key), { data: JSON.stringify(val) });
};
window.fbGetDoc = async (key) => {
  const d = await getDoc(doc(db, "babytracker", key));
  return d.exists() ? JSON.parse(d.data().data) : null;
};
window.fbDeleteDoc = async (key) => {
  await deleteDoc(doc(db, "babytracker", key));
};
window.fbListDocs = async (prefix) => {
  const snap = await getDocs(collection(db, "babytracker"));
  return snap.docs.filter(d => d.id.startsWith(prefix)).map(d => d.id);
};
window.fbOnSnapshot = (callback) => {
  return onSnapshot(collection(db, "babytracker"), callback);
};

function load(k,fb){ try{ const v=localStorage.getItem(k); return v?JSON.parse(v):fb; }catch{return fb;} }
function saveLS(k,v){ try{ localStorage.setItem(k,JSON.stringify(v)); }catch{} }
async function cloudGet(key){ try{ return await window.fbGetDoc(key); }catch{ return null; } }
async function cloudSet(key,val){ try{ await window.fbSetDoc(key,val); }catch(e){ console.error("cloudSet",e); } }
async function cloudDelete(key){ try{ await window.fbDeleteDoc(key); }catch(e){ console.error(e); } }
async function cloudList(prefix){ try{ return await window.fbListDocs(prefix); }catch{ return []; } }
function readFileAsDataURL(file){
  return new Promise((res,rej)=>{ const r=new FileReader(); r.onload=e=>res(e.target.result); r.onerror=rej; r.readAsDataURL(file); });
}

function fmtTime(iso){ return parseLocal(iso).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}); }

async function seedToCloud(){
  // Check if already seeded to cloud
  const already = await cloudGet(CLOUD_SEEDED_KEY);
  if(already) return;
  console.log("Seeding data to cloud...");
  for(const entry of SEED_ENTRIES){ await cloudSet(CLOUD_ENTRY_PFX+entry.id, entry); }
  for(const rec of SEED_HOSPITAL){ await cloudSet(CLOUD_HOSP_PFX+rec.id, rec); }
  await cloudSet(CLOUD_BABY_KEY, SEED_BABY);
  await cloudSet(CLOUD_MEMBERS_KEY, DEFAULT_MEMBERS);
  await cloudSet(CLOUD_SEEDED_KEY, true);
  console.log("Seed complete.");
}
function seedLocal(){
  if(!load(STORAGE_KEY,null))  saveLS(STORAGE_KEY, SEED_ENTRIES);
  if(!load(HOSPITAL_KEY,null)) saveLS(HOSPITAL_KEY, SEED_HOSPITAL);
  if(!load(BABY_KEY,null))     saveLS(BABY_KEY, SEED_BABY);
  if(!load(MEMBERS_KEY,null))  saveLS(MEMBERS_KEY, DEFAULT_MEMBERS);
}

function avatarColor(members,name){ const i=members.indexOf(name); return AVATAR_PALETTE[i>=0?i:0]; }
function initials(name){ return (name||"?").split(" ").map(w=>w[0]).slice(0,2).join("").toUpperCase(); }

export default function NewbornTracker(){
  const [entries,  setEntries]  = useState(()=>load(STORAGE_KEY, SEED_ENTRIES));
  const [hospital, setHospital] = useState(()=>load(HOSPITAL_KEY, SEED_HOSPITAL));
  const [baby,     setBaby]     = useState(()=>load(BABY_KEY, SEED_BABY));
  const [members,  setMembers]  = useState(()=>load(MEMBERS_KEY, DEFAULT_MEMBERS));
  const [view,     setView]     = useState("Home");
  const [modal,    setModal]    = useState(null);
  const [editEntry,setEditEntry]= useState(null);
  const [toast,    setToast]    = useState("");
  const [syncStatus, setSyncStatus] = useState("syncing");
  const [currentUser, setCurrentUser] = useState(()=>load("nbt_user","Dad"));
  const [trendsStart, setTrendsStart] = useState("2026-06-11");
  const [trendsEnd,   setTrendsEnd]   = useState(todayStr());

  const today = todayStr();
  const babyDay = dayNum(BABY_DOB, today);

  // ── Cloud sync: load all data from shared storage on mount ────────────────
  useEffect(()=>{
    seedLocal(); // ensure local fallback exists
    async function loadFromCloud(){
      try{
        // Seed on first ever open
        await seedToCloud();
        // Load entries
        const eKeys = await cloudList(CLOUD_ENTRY_PFX);
        if(eKeys.length>0){
          const eArr = await Promise.all(eKeys.map(k=>cloudGet(k)));
          const valid = eArr.filter(Boolean).sort((a,b)=>a.timestamp.localeCompare(b.timestamp));
          setEntries(valid); saveLS(STORAGE_KEY,valid);
        }
        // Load hospital
        const hKeys = await cloudList(CLOUD_HOSP_PFX);
        if(hKeys.length>0){
          const hArr = await Promise.all(hKeys.map(k=>cloudGet(k)));
          const valid = hArr.filter(Boolean).sort((a,b)=>a.date.localeCompare(b.date));
          setHospital(valid); saveLS(HOSPITAL_KEY,valid);
        }
        // Load baby + members
        const b = await cloudGet(CLOUD_BABY_KEY);
        if(b){ setBaby(b); saveLS(BABY_KEY,b); }
        const m = await cloudGet(CLOUD_MEMBERS_KEY);
        if(m){ setMembers(m); saveLS(MEMBERS_KEY,m); }
        setSyncStatus("live");
      }catch(err){
        console.error("Cloud load error:",err);
        setSyncStatus("offline");
      }
    }
    loadFromCloud();
    // Refresh every 30 seconds to pick up changes from other family members
    const interval = setInterval(loadFromCloud, 30000);
    return ()=>clearInterval(interval);
  },[]);

  const showToast = m=>{ setToast(m); setTimeout(()=>setToast(""),2500); };

  function makeTimestamp(){
    const n=new Date();
    return n.getFullYear()+"-"+String(n.getMonth()+1).padStart(2,"0")+"-"+String(n.getDate()).padStart(2,"0")+"T"+String(n.getHours()).padStart(2,"0")+":"+String(n.getMinutes()).padStart(2,"0")+":00.000";
  }

  const addEntry = async entry=>{
    const e={...entry, id:"e_"+Date.now(), timestamp:entry.timestamp||makeTimestamp(), loggedBy:currentUser};
    setEntries(prev=>[e,...prev]);
    await cloudSet(CLOUD_ENTRY_PFX+e.id, e);
    saveLS(STORAGE_KEY,[e,...load(STORAGE_KEY,[])]);
    setModal(null); showToast("Saved ✓");
  };
  const updateEntry = async u=>{
    setEntries(prev=>prev.map(e=>e.id===u.id?u:e));
    await cloudSet(CLOUD_ENTRY_PFX+u.id, u);
    setModal(null); setEditEntry(null); showToast("Updated ✓");
  };
  const deleteEntry = async id=>{
    setEntries(prev=>prev.filter(e=>e.id!==id));
    await cloudDelete(CLOUD_ENTRY_PFX+id);
    showToast("Deleted");
  };
  const persistB = async b=>{ setBaby(b); saveLS(BABY_KEY,b); await cloudSet(CLOUD_BABY_KEY,b); };
  const persistM = async m=>{ setMembers(m); saveLS(MEMBERS_KEY,m); await cloudSet(CLOUD_MEMBERS_KEY,m); };

  const byDate   = d=>entries.filter(e=>e.timestamp.slice(0,10)===d);
  const feedsD   = d=>byDate(d).filter(e=>e.type==="feed");
  const diapersD = d=>byDate(d).filter(e=>e.type==="diaper");
  const mlD      = d=>feedsD(d).reduce((s,f)=>s+(Number(f.amountMl)||0),0);

  function dateRange(s,e){
    const out=[],cur=new Date(s+"T12:00:00"),last=new Date(e+"T12:00:00");
    while(cur<=last){out.push(cur.toISOString().slice(0,10));cur.setDate(cur.getDate()+1);}
    return out;
  }

  const C={

    teal:"#0D9488",tealL:"#CCFBF1",lav:"#7C3AED",lavL:"#EDE9FE",
    blue:"#3B82F6",blueL:"#EFF6FF",yellow:"#D97706",yellowL:"#FEF3C7",
    text:"#1C1917",body:"#57534E",muted:"#A8A29E",
    success:"#16A34A",white:"#FFFFFF",warn:"#B45309",
    indigo:"#4F46E5",indigoL:"#EEF2FF",
  };
  const inp={width:"100%",boxSizing:"border-box",background:C.bg,border:"1px solid "+C.border,borderRadius:8,padding:"10px 12px",fontSize:14,color:C.text,fontFamily:"inherit",outline:"none",marginBottom:12};
  const lbl=t=><label style={{fontSize:12,fontWeight:600,color:C.body,display:"block",marginBottom:4}}>{t}</label>;

  function Avatar({name,size}){
    size=size||22;

  function PhotoPicker({photo,onPhoto,accent}){

              <span style={{fontSize:18}}>📷</span>Take Photo
            </button>
            <button type="button" onClick={()=>fileRef.current.click()} style={{background:C.bg,border:"1.5px dashed "+C.border,borderRadius:10,padding:"11px 6px",fontSize:12,fontWeight:600,color:C.body,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>

  function CircleTracker({value,max,label,sublabel,color,icon,size}){
    size=size||80;

    return(
      <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>

          <svg width={size} height={size} viewBox="0 0 80 80">

            <circle cx={cx} cy={cy} r={r} fill="none" stroke={color} strokeWidth="7"

    const allBaths=[...entries.filter(e=>e.type==="bath")].sort((a,b)=>b.timestamp.localeCompare(a.timestamp));
    const byD={};
    allBaths.forEach(b=>{const d=b.timestamp.slice(0,10);if(!byD[d])byD[d]=[];byD[d].push(b);});
    function dayLbl(d){ if(d===today)return "Today - Day "+babyDay; return fmtDateFull(d)+" - Day "+dayNum(BABY_DOB,d); }
    const logBathNow=()=>{ const now=new Date(); const h=String(now.getHours()).padStart(2,"0"); const m=String(now.getMinutes()).padStart(2,"0"); addEntry({type:"bath",timestamp:ts(today,h+":"+m),notes:"",photo:null}); };
    return(
      <div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <div style={{fontSize:12,fontWeight:700,color:C.muted,textTransform:"uppercase"}}>{"Bath Log ("+allBaths.length+" total)"}</div>
          <button onClick={logBathNow} style={{background:"#0EA5E9",border:"none",borderRadius:8,padding:"8px 14px",fontSize:13,fontWeight:700,color:C.white,cursor:"pointer"}}>+ Log Bath</button>
        </div>
        {allBaths.length===0&&<div style={{textAlign:"center",padding:"40px 20px",color:C.muted,fontSize:14}}>No baths logged yet.</div>}
        {Object.keys(byD).sort((a,b)=>b.localeCompare(a)).map(function(date){
          return(
            <div key={date} style={{marginBottom:18}}>
              <div style={{padding:"6px 10px",background:"#E0F2FE",borderRadius:8,marginBottom:7}}>
                <span style={{fontSize:12,fontWeight:700,color:"#0369A1"}}>{dayLbl(date)+" — "+byD[date].length+" bath"+(byD[date].length>1?"s":"")}</span>
              </div>
              {byD[date].map(function(b){
                return(
                  <div key={b.id} style={{background:C.surface,border:"1px solid "+C.border,borderRadius:12,padding:"11px 13px",marginBottom:8,display:"flex",gap:9,alignItems:"flex-start"}}>
                    <div style={{width:8,height:8,borderRadius:"50%",background:"#0EA5E9",marginTop:5,flexShrink:0}}/>
                    <div style={{flex:1}}>
                      <div style={{display:"flex",justifyContent:"space-between"}}>
                        <span style={{fontSize:13,fontWeight:700,color:C.text}}>🛁 Baby Bath</span>
                        <span style={{fontSize:11,color:C.muted}}>{fmtTime(b.timestamp)}</span>
                      </div>
                      {b.loggedBy&&<div style={{display:"flex",alignItems:"center",gap:4,marginTop:3}}><Avatar name={b.loggedBy} size={13}/><span style={{fontSize:10,color:C.muted}}>{b.loggedBy}</span></div>}
                      {b.notes&&<div style={{fontSize:12,color:C.body,marginTop:4}}>{b.notes}</div>}
                    </div>
                    <button onClick={()=>deleteEntry(b.id)} style={{background:"none",border:"1px solid #FCA5A5",borderRadius:6,padding:"4px 7px",fontSize:11,color:"#EF4444",cursor:"pointer"}}>X</button>
                  </div>
                );
              })}
            </div>
          );
        })}
      </div>
    );
  }

  const editIsHosp=editEntry&&editEntry._hosp;

  return(
    <div style={{background:C.bg,minHeight:"100vh",fontFamily:"'Inter',system-ui,sans-serif",maxWidth:480,margin:"0 auto"}}>
      {toast&&<div style={{position:"fixed",top:16,left:"50%",transform:"translateX(-50%)",background:C.success,color:C.white,borderRadius:10,padding:"10px 20px",fontSize:14,fontWeight:700,zIndex:200,boxShadow:"0 4px 20px rgba(0,0,0,.2)",whiteSpace:"nowrap"}}>{toast}</div>}

      {modal==="feed"&&<MW onClose={()=>setModal(null)}><FeedModal onSave={addEntry} onClose={()=>setModal(null)}/></MW>}
      {modal==="diaper"&&<MW onClose={()=>setModal(null)}><DiaperModal onSave={addEntry} onClose={()=>setModal(null)}/></MW>}
      {modal==="hospital"&&<MW onClose={()=>setModal(null)}><HospModal onSave={r=>{setHospital(prev=>[...prev.filter(h=>h.id!==r.id),r].sort((a,b)=>a.date.localeCompare(b.date)));cloudSet(CLOUD_HOSP_PFX+r.id,r);setModal(null);showToast("Saved ✓");}} onClose={()=>setModal(null)}/></MW>}
      {modal==="edit"&&editEntry&&!editIsHosp&&(
        <MW onClose={()=>{setModal(null);setEditEntry(null);}}>
          {editEntry.type==="feed"
            ?<FeedModal existing={editEntry} onSave={updateEntry} onClose={()=>{setModal(null);setEditEntry(null);}}/>
            :<DiaperModal existing={editEntry} onSave={updateEntry} onClose={()=>{setModal(null);setEditEntry(null);}}/>
          }
        </MW>
      )}
      {modal==="editHosp"&&editEntry&&(
        <MW onClose={()=>{setModal(null);setEditEntry(null);}}>
          <HospModal existing={editEntry} onSave={r=>{setHospital(prev=>prev.map(h=>h.id===r.id?r:h));cloudSet(CLOUD_HOSP_PFX+r.id,r);setModal(null);setEditEntry(null);showToast("Updated ✓");}} onClose={()=>{setModal(null);setEditEntry(null);}}/>
        </MW>
      )}
      {modal==="baby"&&(
        <MW onClose={()=>setModal(null)}>
          <h3 style={{margin:"0 0 14px",fontSize:16,color:C.text}}>Baby Profile</h3>
          {[["Baby Name","name","text"],["Date of Birth","dob","date"],["Gender","gender","text"]].map(function(item){
            return <div key={item[1]}>{lbl(item[0])}<input type={item[2]} value={baby[item[1]]||""} onChange={e=>setBaby(function(p){const n={...p};n[item[1]]=e.target.value;return n;})} style={inp}/></div>;
          })}
          <button onClick={()=>{persistB(baby);setModal(null);showToast("Saved");}} style={{width:"100%",background:C.accent,border:"none",borderRadius:10,padding:"13px",fontSize:14,fontWeight:700,cursor:"pointer",color:C.white}}>Save</button>
        </MW>
      )}
      {modal==="members"&&<MW onClose={()=>setModal(null)}><MembersModal/></MW>}
      {modal==="share"&&<MW onClose={()=>setModal(null)}><ShareModal/></MW>}

      <div style={{background:C.white,borderBottom:"1px solid "+C.border,padding:"12px 16px",display:"flex",justifyContent:"space-between",alignItems:"center",position:"sticky",top:0,zIndex:50}}>
        <div onClick={()=>setModal("baby")} style={{cursor:"pointer"}}>
          <div style={{fontSize:15,fontWeight:800,color:C.text}}>{"👶 "+(baby.name||"Baby Girl")}</div>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            <div style={{fontSize:10,color:C.muted}}>{"Day "+babyDay+" · "+new Date().toLocaleDateString([],{month:"short",day:"numeric"})}</div>
            <div style={{fontSize:9,fontWeight:700,padding:"2px 6px",borderRadius:10,background:syncStatus==="live"?"#DCFCE7":syncStatus==="offline"?"#FEF3C7":"#EFF6FF",color:syncStatus==="live"?"#16A34A":syncStatus==="offline"?"#D97706":"#3B82F6"}}>
              {syncStatus==="live"?"● Live":syncStatus==="offline"?"○ Offline":"○ Syncing..."}
            </div>
          </div>
        </div>
        <div style={{display:"flex",gap:7}}>
          <button onClick={()=>setModal("members")} style={{background:C.indigoL,border:"none",borderRadius:8,padding:"7px 11px",fontSize:12,fontWeight:700,color:C.indigo,cursor:"pointer"}}>Family</button>
          <button onClick={()=>setModal("share")} style={{background:C.accentL,border:"none",borderRadius:8,padding:"7px 11px",fontSize:12,fontWeight:700,color:C.accent,cursor:"pointer"}}>Share</button>
        </div>
      </div>

      <div style={{padding:"14px 14px 100px"}}>
        {view==="Home"&&<HomeView/>}
        {view==="Feeds"&&<FeedsView/>}
        {view==="Diapers"&&<DiapersView/>}
        {view==="Bath"&&<BathView/>}
        {view==="Tummy"&&<TummyView/>}
        {view==="Hospital"&&<HospitalView/>}
        {view==="Trends"&&<TrendsView/>}
      </div>

      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:C.white,borderTop:"1px solid "+C.border,display:"flex",padding:"8px 0 16px"}}>
        {VIEWS.map(function(v){
          const icons={Home:"🏠",Feeds:"🍼",Diapers:"🩹",Bath:"🛁",Tummy:"🐣",Hospital:"🏥",Trends:"📊"};
          const active=view===v;
          return(
            <button key={v} onClick={()=>setView(v)} style={{flex:1,background:"none",border:"none",cursor:"pointer",padding:"6px 0",display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
              <div style={{fontSize:15}}>{icons[v]}</div>
              <div style={{fontSize:9,fontWeight:active?700:400,color:active?C.accent:C.muted}}>{v}</div>
            </button>
          );
        })}
      </div>
    </div>
  );
}


// Mount the app
const root = createRoot(document.getElementById("root"));
root.render(h(NewbornTracker));
</script>
</body>
</html>
